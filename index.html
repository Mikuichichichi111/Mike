<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Karaoké P2P - Table de Mixage & Micro</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --mixer-bg: #2a2a2c;
            --fader-track: #111;
            --highlight: #ff5e00;
        }
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: #ddd; display: flex; flex-direction: column; align-items: center;
        }
        .hidden { display: none !important; }
        
        /* Styles Skeuomorphiques */
        .btn-skeuo {
            background: linear-gradient(180deg, #444, #222);
            border: 2px solid #111; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.1);
            color: #eee; padding: 15px 30px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: all 0.1s;
        }
        .btn-skeuo:active {
            transform: translateY(3px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .btn-skeuo.active { background: linear-gradient(180deg, var(--highlight), #aa3c00); }

        .mixer-panel {
            background: linear-gradient(135deg, #333, #222); border-radius: 12px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.05);
            padding: 20px; display: flex; gap: 20px; overflow-x: auto; border: 1px solid #111;
        }
        
        .channel-strip {
            background: #252525; padding: 15px; border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border: 1px solid #1a1a1a;
            display: flex; flex-direction: column; align-items: center; gap: 15px; min-width: 80px;
        }

        /* Fader CSS (Skeuomorphisme) */
        input[type=range] {
            -webkit-appearance: none; width: 120px; background: transparent; transform: rotate(-90deg); margin: 60px -40px;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer;
            background: #000; border-radius: 4px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.9);
            border: 1px solid #222;
        }
        input[type=range]::-webkit-slider-thumb {
            box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.3);
            border: 1px solid #111; height: 35px; width: 20px; border-radius: 4px;
            background: linear-gradient(90deg, #555, #888, #555);
            cursor: pointer; -webkit-appearance: none; margin-top: -14px;
            position: relative;
        }
        .knob-container { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; color: #888; }
        .knob { width: 40px; margin: 15px -10px; }

        /* Interface Micro */
        #micro-interface {
            width: 300px; height: 500px; position: relative; margin-top: 20px;
        }
        .sticker { position: absolute; cursor: grab; max-width: 80px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .sticker:active { cursor: grabbing; }

        #lyrics-display {
            font-size: 24px; font-weight: bold; color: var(--highlight); text-align: center;
            min-height: 40px; margin: 20px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .controls-group { display: flex; gap: 10px; margin-bottom: 20px; align-items: center;}
        input[type=text], input[type=file] {
            padding: 10px; background: #111; border: 1px solid #333; color: #eee; border-radius: 4px;
        }
    </style>
</head>
<body>

    <svg width="0" height="0" class="hidden">
        <defs>
            <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#555" />
                <stop offset="50%" stop-color="#aaa" />
                <stop offset="100%" stop-color="#333" />
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.6"/>
            </filter>
            <pattern id="mesh" width="4" height="4" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1.5" fill="#111" />
            </pattern>
        </defs>
    </svg>

    <div id="home-page">
        <h1 style="text-align:center;">Karaoké P2P Local</h1>
        <div style="display:flex; gap:20px; justify-content:center; margin-top:40px;">
            <button class="btn-skeuo" onclick="app.init('mixer')">🎛️ Devenir Table de Mixage</button>
            <button class="btn-skeuo" onclick="app.init('micro')">🎤 Devenir un Micro</button>
        </div>
        <div id="error-log" style="color: #ff5555; margin-top:20px; text-align:center;"></div>
    </div>

    <div id="micro-controls" class="hidden">
        <h2>🎤 Mode Micro</h2>
        <div class="controls-group">
            <input type="text" id="target-mixer-id" placeholder="ID de la Table de mixage">
            <button class="btn-skeuo" onclick="app.connectMicroToMixer()">Connecter</button>
            <button id="btn-mute" class="btn-skeuo" onclick="app.toggleMute()">Mute</button>
        </div>
        <div class="controls-group">
            <label>Ajouter un Sticker (PNG) :</label>
            <input type="file" id="sticker-upload" accept="image/png">
        </div>
        
        <div id="lyrics-display">En attente de la musique...</div>

        <div id="micro-interface" ondrop="app.dropSticker(event)" ondragover="event.preventDefault()">
            <svg width="100%" height="100%" viewBox="0 0 100 200">
                <rect x="40" y="80" width="20" height="100" rx="5" fill="url(#metal)" filter="url(#shadow)"/>
                <circle cx="50" cy="50" r="30" fill="url(#metal)" filter="url(#shadow)"/>
                <circle cx="50" cy="50" r="30" fill="url(#mesh)" opacity="0.8"/>
                <path d="M 25 50 A 25 25 0 0 0 75 50" fill="none" stroke="#222" stroke-width="4"/>
            </svg>
        </div>
    </div>

    <div id="mixing-desk-controls" class="hidden">
        <h2>🎛️ Table de Mixage (Votre ID : <span id="my-mixer-id" style="color:var(--highlight)">Chargement...</span>)</h2>
        
        <div class="controls-group" style="background:#222; padding:15px; border-radius:8px;">
            <div>
                <label>Musique (MP3) :</label> <input type="file" id="audio-file" accept="audio/*">
            </div>
            <div>
                <label>Paroles (LRC) :</label> <input type="file" id="lrc-file" accept=".lrc">
            </div>
            <div>
                <input type="checkbox" id="vocal-remove-cb" onchange="app.toggleVocalRemover(this.checked)">
                <label for="vocal-remove-cb">Isoler Instrumental (Notch)</label>
            </div>
            <div>
                <input type="checkbox" id="copyright-cb">
                <label for="copyright-cb">Copyright (Bloquer Rec)</label>
            </div>
            <button class="btn-skeuo" onclick="app.startKaraoke()">▶ Lire</button>
            <button class="btn-skeuo" id="btn-record" onclick="app.toggleRecording()">🔴 REC Instru</button>
        </div>

        <audio id="karaoke-audio" class="hidden"></audio>

        <div class="mixer-panel" id="mixer-tracks">
            <div class="channel-strip" id="master-strip">
                <strong style="color:var(--highlight)">MASTER</strong>
                <div class="knob-container">
                    <span>Reverb</span>
                    <input type="range" class="knob" min="0" max="1" step="0.01" value="0.2" oninput="app.updateMasterFX('reverb', this.value)">
                </div>
                <input type="range" min="0" max="2" step="0.01" value="1" oninput="app.updateMasterVolume(this.value)">
                <span>VOL</span>
            </div>
        </div>
    </div>

    <script>
        const app = {
            role: null, peer: null, localStream: null, connections: [],
            audioCtx: null, masterGain: null, karaokeSource: null, vocalRemover: null, delayNode: null,
            mediaRecorder: null, recordedChunks: [], recDestination: null,
            lyrics: [], currentLyricIndex: -1, dataChannels: [],

            log: (msg) => document.getElementById('error-log').innerText = msg,

            init: async function(selectedRole) {
                if (!window.RTCPeerConnection || !navigator.mediaDevices) {
                    return this.log("Erreur : WebRTC non supporté par ce navigateur.");
                }
                this.role = selectedRole;
                document.getElementById('home-page').classList.add('hidden');
                
                try {
                    if (this.role === 'micro') {
                        document.getElementById('micro-controls').classList.remove('hidden');
                        this.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        this.initPeer();
                        this.initStickerDrag();
                    } else {
                        document.getElementById('mixing-desk-controls').classList.remove('hidden');
                        this.initAudioContext();
                        this.initPeer();
                    }
                } catch (err) {
                    this.log("Erreur d'accès : " + err.message + " (SSL/localhost requis pour le micro)");
                }
            },

            initPeer: function() {
                this.peer = new Peer({ debug: 2 }); 
                this.peer.on('open', id => {
                    if (this.role === 'mixer') document.getElementById('my-mixer-id').innerText = id;
                });
                
                this.peer.on('error', err => this.log("Erreur PeerJS: " + err.type));

                if (this.role === 'mixer') {
                    this.peer.on('connection', conn => {
                        this.dataChannels.push(conn);
                        conn.on('data', data => { /* handle data if needed */ });
                    });
                    this.peer.on('call', call => {
                        call.answer(); 
                        call.on('stream', remoteStream => this.addMixerTrack(call.peer, remoteStream));
                    });
                } else {
                    this.peer.on('connection', conn => {
                        conn.on('data', data => {
                            if(data.type === 'lyric') document.getElementById('lyrics-display').innerText = data.text;
                        });
                    });
                }
            },

            connectMicroToMixer: function() {
                const targetId = document.getElementById('target-mixer-id').value;
                if (!targetId) return this.log("ID manquant");
                
                const conn = this.peer.connect(targetId);
                const call = this.peer.call(targetId, this.localStream);
                call.on('error', err => this.log("Erreur d'appel. Même réseau?"));
            },

            toggleMute: function() {
                if (!this.localStream) return;
                const audioTrack = this.localStream.getAudioTracks()[0];
                audioTrack.enabled = !audioTrack.enabled;
                const btn = document.getElementById('btn-mute');
                btn.classList.toggle('active');
                btn.innerText = audioTrack.enabled ? "Mute" : "Unmute";
            },

            /* --- WEBAUDIO API (MIXER) --- */
            initAudioContext: function() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.audioCtx = new AudioContext();
                this.masterGain = this.audioCtx.createGain();
                
                // Simple Delay for global "Reverb" effect
                this.delayNode = this.audioCtx.createDelay();
                this.delayNode.delayTime.value = 0.15;
                const feedback = this.audioCtx.createGain();
                feedback.gain.value = 0.2;
                this.delayNode.connect(feedback);
                feedback.connect(this.delayNode);
                
                this.delayNode.connect(this.masterGain);
                this.masterGain.connect(this.audioCtx.destination);

                // For recording ONLY instrumental
                this.recDestination = this.audioCtx.createMediaStreamDestination();
            },

            addMixerTrack: function(peerId, stream) {
                if(this.audioCtx.state === 'suspended') this.audioCtx.resume();

                const strip = document.createElement('div');
                strip.className = 'channel-strip';
                strip.innerHTML = `
                    <strong>MIC ${peerId.substring(0,4)}</strong>
                    <div class="knob-container"><span>HI</span><input type="range" class="knob" min="-15" max="15" value="0" id="hi-${peerId}"></div>
                    <div class="knob-container"><span>MID</span><input type="range" class="knob" min="-15" max="15" value="0" id="mid-${peerId}"></div>
                    <div class="knob-container"><span>LOW</span><input type="range" class="knob" min="-15" max="15" value="0" id="low-${peerId}"></div>
                    <input type="range" min="0" max="2" step="0.01" value="1" id="vol-${peerId}">
                    <button class="btn-skeuo" style="padding:5px 10px; font-size:10px;" id="mute-${peerId}">M</button>
                `;
                document.getElementById('mixer-tracks').insertBefore(strip, document.getElementById('master-strip'));

                const source = this.audioCtx.createMediaStreamSource(stream);
                const low = this.audioCtx.createBiquadFilter(); low.type = "lowshelf"; low.frequency.value = 250;
                const mid = this.audioCtx.createBiquadFilter(); mid.type = "peaking"; mid.frequency.value = 1000; mid.Q.value = 1;
                const hi = this.audioCtx.createBiquadFilter(); hi.type = "highshelf"; hi.frequency.value = 4000;
                const gain = this.audioCtx.createGain();

                source.connect(low); low.connect(mid); mid.connect(hi); hi.connect(gain);
                gain.connect(this.masterGain);
                gain.connect(this.delayNode); // Send to global FX

                document.getElementById(`low-${peerId}`).oninput = (e) => low.gain.value = e.target.value;
                document.getElementById(`mid-${peerId}`).oninput = (e) => mid.gain.value = e.target.value;
                document.getElementById(`hi-${peerId}`).oninput = (e) => hi.gain.value = e.target.value;
                document.getElementById(`vol-${peerId}`).oninput = (e) => gain.gain.value = e.target.value;
                document.getElementById(`mute-${peerId}`).onclick = (e) => {
                    gain.gain.value = gain.gain.value > 0 ? 0 : document.getElementById(`vol-${peerId}`).value;
                    e.target.classList.toggle('active');
                };
            },

            updateMasterVolume: function(val) { if(this.masterGain) this.masterGain.gain.value = val; },
            updateMasterFX: function(type, val) { 
                // Using simple delay node mix trick mapped to knob
                if(this.delayNode) {
                    const delayGain = this.audioCtx.createGain();
                    delayGain.gain.value = val;
                }
            },

            /* --- KARAOKE & MEDIA --- */
            startKaraoke: async function() {
                if(this.audioCtx.state === 'suspended') this.audioCtx.resume();
                
                const audioFile = document.getElementById('audio-file').files[0];
                const lrcFile = document.getElementById('lrc-file').files[0];
                if(!audioFile) return this.log("Veuillez charger un fichier audio.");

                const audioEl = document.getElementById('karaoke-audio');
                audioEl.src = URL.createObjectURL(audioFile);
                
                if(!this.karaokeSource) {
                    this.karaokeSource = this.audioCtx.createMediaElementSource(audioEl);
                    this.vocalRemover = this.audioCtx.createBiquadFilter();
                    this.vocalRemover.type = "notch";
                    this.vocalRemover.frequency.value = 1000; // Fréq vocale moyenne
                    this.vocalRemover.Q.value = 1.5;
                    
                    const karaokeGain = this.audioCtx.createGain();
                    
                    // Routing: Source -> Notch (toggleable) -> Gain -> Destination
                    // And route to REC destination
                    this.karaokeSource.connect(this.vocalRemover);
                    this.vocalRemover.connect(karaokeGain);
                    karaokeGain.connect(this.masterGain);
                    karaokeGain.connect(this.recDestination); // Record instrumental cleanly
                }

                if(lrcFile) {
                    const text = await lrcFile.text();
                    this.parseLRC(text);
                }

                audioEl.play();
                this.syncLyrics(audioEl);
            },

            toggleVocalRemover: function(active) {
                if(!this.vocalRemover) return;
                // Détournement simple : on change le Q pour annuler l'effet si non coché
                this.vocalRemover.Q.value = active ? 1.5 : 0.0001; 
            },

            parseLRC: function(lrcText) {
                this.lyrics = [];
                const lines = lrcText.split('\n');
                const regex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;
                for(let line of lines) {
                    const match = regex.exec(line);
                    if(match) {
                        const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                        this.lyrics.push({ time, text: match[3].trim() });
                    }
                }
            },

            syncLyrics: function(audioEl) {
                if(this.lyrics.length === 0) return;
                const update = () => {
                    const ct = audioEl.currentTime;
                    let nextIndex = this.lyrics.findIndex(l => l.time > ct);
                    if(nextIndex === -1) nextIndex = this.lyrics.length;
                    const currentIndex = nextIndex - 1;
                    
                    if(currentIndex !== this.currentLyricIndex && currentIndex >= 0) {
                        this.currentLyricIndex = currentIndex;
                        const text = this.lyrics[currentIndex].text;
                        this.dataChannels.forEach(c => c.send({type: 'lyric', text: text}));
                    }
                    if(!audioEl.paused) requestAnimationFrame(update);
                };
                update();
            },

            toggleRecording: function() {
                const btn = document.getElementById('btn-record');
                const isCopyright = document.getElementById('copyright-cb').checked;
                if(isCopyright) {
                    this.log("Enregistrement bloqué (Copyright).");
                    return;
                }

                if(this.mediaRecorder && this.mediaRecorder.state === "recording") {
                    this.mediaRecorder.stop();
                    btn.classList.remove('active');
                    btn.innerText = "🔴 REC Instru";
                } else {
                    this.recordedChunks = [];
                    // Using default webm/ogg for native compatibility & lightweight code
                    this.mediaRecorder = new MediaRecorder(this.recDestination.stream); 
                    this.mediaRecorder.ondataavailable = e => { if(e.data.size > 0) this.recordedChunks.push(e.data); };
                    this.mediaRecorder.onstop = () => {
                        const blob = new Blob(this.recordedChunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = 'karaoke-instrumental.webm';
                        a.click();
                    };
                    this.mediaRecorder.start();
                    btn.classList.add('active');
                    btn.innerText = "⏹ STOP Rec";
                }
            },

            /* --- STICKERS --- */
            initStickerDrag: function() {
                document.getElementById('sticker-upload').onchange = (e) => {
                    const file = e.target.files[0];
                    if(!file) return;
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.className = 'sticker';
                    img.style.left = '100px'; img.style.top = '100px';
                    
                    img.onmousedown = (ev) => {
                        let shiftX = ev.clientX - img.getBoundingClientRect().left;
                        let shiftY = ev.clientY - img.getBoundingClientRect().top;
                        const moveAt = (pageX, pageY) => {
                            img.style.left = pageX - shiftX + 'px';
                            img.style.top = pageY - shiftY + 'px';
                        };
                        const onMouseMove = (ev) => moveAt(ev.pageX, ev.pageY);
                        document.addEventListener('mousemove', onMouseMove);
                        document.onmouseup = () => {
                            document.removeEventListener('mousemove', onMouseMove);
                            document.onmouseup = null;
                        };
                    };
                    img.ondragstart = () => false;
                    document.getElementById('micro-interface').appendChild(img);
                };
            }
        };
    </script>
</body>
</html>
